<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LockWatch - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0025, #2d0040, #1a0025);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(220, 100, 255, 0.3);
            border-radius: 20px;
            padding: 48px 40px;
            width: 360px;
            box-shadow: 0 8px 40px rgba(180, 0, 255, 0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo span { font-size: 2rem; }

        .logo h2 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(90deg, #e040fb, #f48fb1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 6px;
        }

        .logo p {
            color: #bb86d4;
            font-size: 0.8rem;
            font-weight: 300;
            margin-top: 4px;
        }

        label {
            display: block;
            color: #e0b0ff;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 6px;
            margin-top: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(220, 100, 255, 0.25);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #e040fb; }

        .strength-bar {
            height: 5px;
            border-radius: 5px;
            margin-top: 8px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: width 0.3s, background 0.3s;
        }

        .strength-label {
            font-size: 0.75rem;
            margin-top: 4px;
            color: #9b6baa;
            text-align: right;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 28px;
            background: linear-gradient(90deg, #e040fb, #f48fb1);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.88; }

        .error {
            color: #ff6b9d;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 12px;
        }

        .success {
            color: #00e676;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #9b6baa;
            font-size: 0.8rem;
        }

        .footer a {
            color: #e040fb;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span>🔐</span>
            <h2>LockWatch</h2>
            <p>Create your account</p>
        </div>

        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username">

        <label>Password</label>
        <label>Password</label>
        <input type="password" id="password" placeholder="Choose a password" oninput="checkStrength(this.value)">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <p class="strength-label" id="strengthLabel">Enter a password</p>
        </div>

        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <p class="strength-label" id="strengthLabel">Enter a password</p>

        <button onclick="handleRegister()">Create Account</button>

        <div id="message"></div>

        <div class="footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        function checkStrength(password) {
            const fill = document.getElementById("strengthFill");
            const label = document.getElementById("strengthLabel");
            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const levels = [
                { width: "25%", color: "#ff4444", text: "Weak" },
                { width: "50%", color: "#ff9800", text: "Fair" },
                { width: "75%", color: "#ffeb3b", text: "Good" },
                { width: "100%", color: "#00e676", text: "Strong" },
            ];

            if (password.length === 0) {
                fill.style.width = "0%";
                label.textContent = "Enter a password";
                return;
            }

            const level = levels[score - 1] || levels[0];
            fill.style.width = level.width;
            fill.style.background = level.color;
            label.textContent = level.text;
            label.style.color = level.color;
        }

        function handleRegister() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("message");

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `username=${username}&password=${password}`
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msg.innerHTML = `<p class="success">Account created! <a href="/login" style="color:#e040fb">Sign in</a></p>`;
                } else {
                    msg.innerHTML = `<p class="error">${data.error}</p>`;
                }
            });
        }
        function togglePassword() {
            const input = document.getElementById("password");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
